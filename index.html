<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Come, Follow Me — Picture Viewer · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     REVERENT MINIMALISM — parchment · walnut ink · quiet gold
     ============================================================ */
  :root {
    --parchment: #f4eddc;
    --parchment-deep: #ebe1c9;
    --parchment-lift: #faf5e8;
    --ink: #2a241b;
    --ink-soft: #5a4e3c;
    --ink-faint: #8a7e68;
    --rule: #d4c8a8;
    --rule-soft: #e3d8b9;
    --gilt: #9a7a2e;
    --gilt-soft: #b89656;
    --today: #7b5a1a;
    --today-bg: #efe3bf;
    --shadow: 0 1px 0 rgba(42, 36, 27, 0.04), 0 10px 30px -12px rgba(42, 36, 27, 0.18);
    --shadow-lift: 0 2px 0 rgba(42, 36, 27, 0.05), 0 24px 60px -20px rgba(42, 36, 27, 0.28);
    --radius: 2px;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Lora', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    font-size: 18px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* parchment texture — subtle radial wash */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255, 244, 210, 0.5), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(214, 186, 130, 0.18), transparent 55%);
  }

  button, a { font: inherit; color: inherit; }
  button { border: 0; background: transparent; cursor: pointer; }
  :focus-visible {
    outline: 3px solid var(--gilt);
    outline-offset: 3px;
    border-radius: var(--radius);
  }

  /* ============================================================
     HEADER
     ============================================================ */
  .site {
    position: relative;
    z-index: 1;
    max-width: 1440px;
    margin: 0 auto;
    padding: clamp(20px, 4vw, 48px) clamp(16px, 4vw, 56px);
  }

  .masthead {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 28px;
  }
  .masthead-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: clamp(28px, 4.5vw, 44px);
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .masthead-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .masthead-sub {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gilt);
    margin-top: 8px;
  }
  .masthead-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .chip {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: var(--parchment-lift);
    border: 1px solid var(--rule);
    padding: 12px 18px;
    border-radius: 999px;
    transition: all 0.2s var(--ease);
    min-height: 44px;
  }
  .chip:hover { background: var(--parchment-deep); color: var(--ink); border-color: var(--gilt-soft); }
  .chip[aria-pressed="true"] { background: var(--ink); color: var(--parchment); border-color: var(--ink); }
  .chip svg { width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px; }

  /* ============================================================
     LESSON LIST (home view)
     ============================================================ */
  .home-intro {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: clamp(20px, 4vw, 48px);
    align-items: center;
    padding: 20px 0 40px;
  }
  .home-today-card {
    background: var(--parchment-lift);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--gilt);
    padding: 24px 28px;
    max-width: 520px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .home-today-card::before {
    content: "This Week";
    position: absolute;
    top: -11px;
    left: 22px;
    background: var(--parchment);
    padding: 0 10px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gilt);
  }
  .home-today-date {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .home-today-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(24px, 3vw, 30px);
    font-weight: 500;
    line-height: 1.15;
    margin: 6px 0 16px;
  }
  .home-today-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--parchment);
    padding: 14px 22px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 16px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--ink);
    transition: all 0.2s var(--ease);
    min-height: 52px;
  }
  .home-today-cta:hover { background: var(--gilt); border-color: var(--gilt); }
  .home-today-cta svg { width: 20px; height: 20px; }

  .lessons-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin: 24px 0 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .lessons-header h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .lessons-count {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .lessons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }
  .lesson-card {
    background: var(--parchment-lift);
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
    transition: background 0.15s var(--ease), transform 0.15s var(--ease);
    min-height: 130px;
    position: relative;
    font-family: 'Lora', Georgia, serif;
  }
  .lesson-card:hover {
    background: var(--parchment);
  }
  .lesson-card.is-today {
    background: var(--today-bg);
    outline: 2px solid var(--gilt);
    outline-offset: -2px;
  }
  .lesson-card.is-today::after {
    content: "TODAY";
    position: absolute;
    top: 10px;
    right: 14px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    color: var(--today);
  }
  .lesson-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gilt);
  }
  .lesson-date {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .lesson-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.2;
    color: var(--ink);
    margin-top: 4px;
  }

  /* ============================================================
     VIEWER — the slideshow
     ============================================================ */
  .viewer { display: none; }
  .viewer.is-active { display: block; }
  body.viewing .home { display: none; }

  .viewer-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 12px 16px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    min-height: 48px;
    transition: all 0.15s var(--ease);
  }
  .back-btn:hover { color: var(--ink); border-color: var(--rule); background: var(--parchment-lift); }
  .back-btn svg { width: 18px; height: 18px; }

  .viewer-heading { flex: 1 1 auto; text-align: center; min-width: 0; }
  .viewer-date {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gilt);
  }
  .viewer-scripture {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(20px, 2.6vw, 28px);
    font-weight: 500;
    line-height: 1.2;
    margin-top: 4px;
  }

  .viewer-modes { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Stage — the main picture */
  .stage {
    position: relative;
    background: var(--parchment-lift);
    border: 1px solid var(--rule);
    padding: clamp(14px, 2.5vw, 28px);
    box-shadow: var(--shadow-lift);
  }
  .stage-inner {
    position: relative;
    width: 100%;
    /* A generous aspect ratio that accommodates portrait and landscape */
    aspect-ratio: 16 / 10;
    background: #1a1510;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @media (max-width: 640px) {
    .stage-inner { aspect-ratio: 4 / 3; }
  }
  .stage-image {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    opacity: 0;
    transition: opacity 0.5s var(--ease);
  }
  .stage-image.is-loaded { opacity: 1; }
  .stage-symbol {
    display: none;
    color: var(--parchment);
    width: min(70%, 380px);
    aspect-ratio: 1;
  }
  .stage-symbol svg { width: 100%; height: 100%; }
  .stage-symbol-label {
    position: absolute;
    bottom: clamp(18px, 4vw, 36px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(18px, 2.4vw, 26px);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment);
    opacity: 0.82;
  }
  /* Simple mode — symbol takes the stage */
  body.simple-mode .stage-image { display: none; }
  body.simple-mode .stage-symbol { display: block; }

  .stage-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 244, 210, 0.5);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.4s var(--ease);
  }
  .stage-loading.is-hidden { opacity: 0; }

  .caption {
    text-align: center;
    margin-top: 22px;
    padding: 0 20px;
  }
  .caption-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(18px, 2vw, 22px);
    font-weight: 500;
    color: var(--ink);
  }
  .caption-source {
    font-family: 'Lora', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  .caption-counter {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gilt);
    margin-top: 10px;
  }

  /* Nav buttons — the Previous/Next — LARGE */
  .navrow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 26px;
  }
  .navbtn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: clamp(20px, 3vw, 30px) 28px;
    background: var(--ink);
    color: var(--parchment);
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(18px, 2.2vw, 24px);
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid var(--ink);
    min-height: 72px;
    transition: all 0.15s var(--ease);
  }
  .navbtn:hover:not(:disabled) { background: var(--gilt); border-color: var(--gilt); }
  .navbtn:active:not(:disabled) { transform: translateY(1px); }
  .navbtn:disabled { opacity: 0.35; cursor: not-allowed; }
  .navbtn svg { width: 28px; height: 28px; }
  .navbtn.prev svg { transform: rotate(180deg); }

  /* Thumbnail strip */
  .thumbstrip {
    margin-top: 24px;
    padding: 16px 0;
    border-top: 1px solid var(--rule);
    display: flex;
    gap: 12px;
    overflow-x: auto;
    scroll-padding: 16px;
    scroll-behavior: smooth;
  }
  .thumbstrip.is-hidden { display: none; }
  .thumb {
    flex: 0 0 auto;
    width: 110px;
    height: 80px;
    background: var(--parchment-lift);
    border: 2px solid var(--rule);
    padding: 4px;
    transition: all 0.15s var(--ease);
    position: relative;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb:hover { border-color: var(--gilt-soft); }
  .thumb[aria-current="true"] { border-color: var(--gilt); box-shadow: 0 0 0 3px var(--gilt-soft); }

  /* Symbol strip */
  .symbolstrip {
    margin-top: 20px;
    padding: 20px;
    background: var(--parchment-lift);
    border: 1px solid var(--rule);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .symbolstrip.is-hidden { display: none; }
  .symbolstrip-label {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-right: 8px;
  }
  .symbol-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: var(--parchment);
    border: 1px solid var(--rule);
    color: var(--ink);
    min-width: 90px;
    min-height: 90px;
    transition: all 0.15s var(--ease);
  }
  .symbol-btn:hover { background: var(--parchment-deep); border-color: var(--gilt-soft); }
  .symbol-btn[aria-current="true"] {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }
  .symbol-btn svg { width: 36px; height: 36px; }
  .symbol-btn .lbl {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ============================================================
     FULL-SCREEN CLASS MODE
     ============================================================ */
  body.fullscreen-mode {
    background: #0f0c07;
  }
  body.fullscreen-mode::before { display: none; }
  body.fullscreen-mode .site {
    padding: 0;
    max-width: none;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  body.fullscreen-mode .masthead,
  body.fullscreen-mode .home,
  body.fullscreen-mode .viewer-topbar,
  body.fullscreen-mode .thumbstrip,
  body.fullscreen-mode .symbolstrip,
  body.fullscreen-mode .caption-source {
    display: none;
  }
  body.fullscreen-mode .viewer { display: flex; flex: 1; flex-direction: column; }
  body.fullscreen-mode .stage {
    background: transparent;
    border: 0;
    padding: 0;
    box-shadow: none;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  body.fullscreen-mode .stage-inner {
    aspect-ratio: auto;
    flex: 1;
    background: #0f0c07;
  }
  body.fullscreen-mode .caption {
    color: var(--parchment);
    padding: 16px;
    margin-top: 0;
    background: #0f0c07;
  }
  body.fullscreen-mode .caption-title { color: var(--parchment); }
  body.fullscreen-mode .caption-counter { color: var(--gilt-soft); }
  body.fullscreen-mode .navrow {
    margin: 0;
    gap: 0;
    background: #0f0c07;
  }
  body.fullscreen-mode .navbtn {
    border-radius: 0;
    border: 0;
    border-top: 1px solid #2a241b;
    background: #1a1510;
    color: var(--parchment);
    padding: 24px;
  }
  body.fullscreen-mode .navbtn:hover:not(:disabled) { background: var(--gilt); color: #0f0c07; }

  /* Exit-fullscreen button */
  .exit-fs {
    display: none;
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    width: 48px;
    height: 48px;
    background: rgba(15, 12, 7, 0.7);
    color: var(--parchment);
    border: 1px solid rgba(244, 237, 220, 0.25);
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: all 0.15s var(--ease);
  }
  .exit-fs:hover { background: rgba(15, 12, 7, 0.9); border-color: var(--gilt); }
  .exit-fs svg { width: 22px; height: 22px; }
  body.fullscreen-mode .exit-fs { display: flex; }

  /* ============================================================
     FOOTER
     ============================================================ */
  .site-foot {
    margin-top: 56px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .site-foot a { color: var(--gilt); text-decoration: none; border-bottom: 1px dotted var(--gilt-soft); }
  .site-foot a:hover { color: var(--today); }
  body.fullscreen-mode .site-foot { display: none; }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 720px) {
    .home-intro { grid-template-columns: 1fr; }
    .home-today-card { max-width: none; }
    .navbtn { padding: 18px; font-size: 16px; letter-spacing: 0.1em; }
    .navbtn span { display: none; }
    .navbtn.prev::before { content: "Prev"; font-size: 18px; }
    .navbtn.next::after { content: "Next"; font-size: 18px; }
    .thumb { width: 80px; height: 60px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }

  /* Screen reader only */
  .sr { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
</style>
</head>

<script>
(() => {
  'use strict';

  // ============================================================
  // DATA LOADING — try fetch, fall back to embedded JSON
  // ============================================================
  async function loadJSON(path, embeddedId) {
    // First try to fetch the external file (works on any web server or GitHub Pages)
    try {
      const res = await fetch(path, { cache: 'no-store' });
      if (res.ok) {
        const text = await res.text();
        return JSON.parse(text);
      }
    } catch (e) { /* fall through to embedded */ }

    // Fall back to the JSON copy embedded inside this HTML file
    // (this is what lets the app work when opened directly via file://)
    const el = document.getElementById(embeddedId);
    if (el) {
      const text = el.textContent.trim();
      if (text) {
        try {
          return JSON.parse(text);
        } catch (parseErr) {
          throw new Error('Embedded ' + embeddedId + ' is not valid JSON: ' + parseErr.message);
        }
      }
    }
    throw new Error('Could not load ' + path + ' and no embedded fallback was found');
  }

  const App = {
    lessons: [],
    // Two separate image catalogs. The toggle decides which one is active.
    images: {
      manual: {},      // images from the Come Follow Me 2026 manual
      gospelArt: {},   // images from the Gospel Art Book
    },
    symbols: {},
    currentLesson: null,
    currentIndex: 0,
    currentTrack: 'images', // 'images' or 'symbols'
    // Which image collection is shown. 'gospelArt' prefers Church-approved
    // traditional paintings; 'manual' shows the modern manual imagery.
    imageSource: (function() {
      try {
        const stored = localStorage.getItem('cfm_imageSource');
        if (stored === 'gospelArt' || stored === 'manual') return stored;
      } catch (_) { /* localStorage may be disabled */ }
      return 'gospelArt'; // default to Church-approved Gospel Art Book
    })(),

    async init() {
      try {
        const [l, i, s] = await Promise.all([
          loadJSON('lessons.json', 'embedded-lessons'),
          loadJSON('images.json', 'embedded-images'),
          loadJSON('symbols.json', 'embedded-symbols'),
        ]);
        this.lessons = l.lessons || [];
        // Support both the old flat {images: {...}} shape and the new
        // {manual: {...}, gospelArt: {...}} shape.
        if (i.manual || i.gospelArt) {
          this.images.manual = i.manual || {};
          this.images.gospelArt = i.gospelArt || {};
        } else if (i.images) {
          // Legacy fallback
          this.images.manual = i.images;
          this.images.gospelArt = {};
        }
        this.symbols = s.symbols || {};
      } catch (e) {
        console.error(e);
        const msg = (e && e.message) ? e.message : String(e);
        document.getElementById('lessonsGrid').innerHTML =
          '<div style="padding:40px; grid-column: 1/-1; text-align:center; color: var(--ink-soft); line-height:1.6;">' +
          '<strong style="color: var(--danger, #a04020); display:block; margin-bottom:8px; font-size:18px;">Could not load lesson data.</strong>' +
          '<span style="font-family: monospace; font-size: 13px;">' + msg.replace(/</g, '&lt;') + '</span>' +
          '<br><br><span style="font-size: 14px;">If you opened this file directly, try running a local web server, or upload the repo to GitHub Pages.</span>' +
          '</div>';
        return;
      }

      this.renderLessons();
      this.renderToday();
      this.wireEvents();
      // Sync chip state with the saved preference (from localStorage)
      const chip = document.getElementById('toggleSource');
      if (chip) {
        chip.setAttribute('aria-pressed', this.imageSource === 'gospelArt' ? 'true' : 'false');
        const lbl = chip.querySelector('.chip-label');
        if (lbl) lbl.textContent = (this.imageSource === 'gospelArt') ? 'Gospel Art' : 'Manual Art';
      }
      this.handleInitialRoute();
    },

    // ---- today helper
    getTodayLesson() {
      const today = new Date();
      const todayISO = today.toISOString().slice(0, 10);
      // Find a lesson whose date range includes today
      let match = this.lessons.find(L => L.dateStart <= todayISO && todayISO <= L.dateEnd);
      if (match) return match;
      // Otherwise return the nearest upcoming or the most recent past lesson
      const upcoming = this.lessons.find(L => L.dateStart > todayISO);
      if (upcoming) return upcoming;
      return this.lessons[this.lessons.length - 1];
    },

    // ---- image-source resolvers ----
    // Given a lesson, return the array of image ids to actually display
    // based on the currently-selected imageSource. Falls back to the manual
    // images when a lesson has no Gospel Art entries for that week.
    resolvedImageIds(L) {
      if (!L) return [];
      if (this.imageSource === 'gospelArt'
          && Array.isArray(L.gospelArtImages)
          && L.gospelArtImages.length > 0) {
        return L.gospelArtImages;
      }
      return L.images || [];
    },
    // Which catalog (manual or gospelArt) provides those ids?
    resolvedCatalog(L) {
      if (!L) return this.images.manual;
      if (this.imageSource === 'gospelArt'
          && Array.isArray(L.gospelArtImages)
          && L.gospelArtImages.length > 0) {
        return this.images.gospelArt;
      }
      return this.images.manual;
    },
    // Did we fall back from gospelArt to manual for this lesson?
    didFallBackForCurrentLesson() {
      const L = this.currentLesson;
      if (!L) return false;
      return this.imageSource === 'gospelArt'
          && (!Array.isArray(L.gospelArtImages) || L.gospelArtImages.length === 0);
    },

    setImageSource(src) {
      if (src !== 'manual' && src !== 'gospelArt') return;
      this.imageSource = src;
      try { localStorage.setItem('cfm_imageSource', src); } catch (_) {}
      // Update the toggle chip's pressed state
      const chip = document.getElementById('toggleSource');
      if (chip) {
        chip.setAttribute('aria-pressed', src === 'gospelArt' ? 'true' : 'false');
        const lbl = chip.querySelector('.chip-label');
        if (lbl) lbl.textContent = (src === 'gospelArt') ? 'Gospel Art' : 'Manual Art';
      }
      // If we're currently viewing a lesson, re-render so the image refreshes
      if (this.currentLesson) {
        this.currentTrack = 'images'; // reset from symbols if needed
        this.currentIndex = 0;
        this.renderThumbs();
        this.showCurrent();
      }
    },

    renderToday() {
      const L = this.getTodayLesson();
      if (!L) return;
      document.getElementById('todayDate').textContent = L.dateLabel;
      document.getElementById('todayTitle').textContent = L.scripture;
      document.getElementById('todayCta').onclick = () => this.openLesson(L.id);
      document.getElementById('lessonsCount').textContent = `${this.lessons.length} Weeks`;
    },

    renderLessons() {
      const grid = document.getElementById('lessonsGrid');
      const today = new Date().toISOString().slice(0, 10);
      grid.innerHTML = this.lessons.map(L => {
        const isToday = L.dateStart <= today && today <= L.dateEnd;
        return `
          <button class="lesson-card${isToday ? ' is-today' : ''}" data-id="${L.id}" role="listitem" aria-label="Week ${L.id}: ${L.scripture}, ${L.dateLabel}">
            <div class="lesson-num">Week ${String(L.id).padStart(2, '0')}</div>
            <div class="lesson-date">${L.dateLabel}</div>
            <div class="lesson-title">${L.scripture}</div>
          </button>
        `;
      }).join('');
      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.lesson-card');
        if (card) this.openLesson(parseInt(card.dataset.id, 10));
      });
    },

    openLesson(id) {
      const L = this.lessons.find(x => x.id === id);
      if (!L) return;
      this.currentLesson = L;
      this.currentIndex = 0;
      this.currentTrack = 'images';
      document.body.classList.add('viewing');
      document.getElementById('homeView').style.display = 'none';
      document.getElementById('viewerView').classList.add('is-active');
      document.getElementById('viewerDate').textContent = L.dateLabel;
      document.getElementById('viewerScripture').textContent = L.scripture;
      this.renderThumbs();
      this.renderSymbolStrip();
      this.showCurrent();
      // update URL hash so it's bookmarkable / refresh-safe
      history.replaceState(null, '', '#week-' + L.id);
      // focus the Next button so keyboard users are ready to advance
      setTimeout(() => document.getElementById('nextBtn').focus({ preventScroll: true }), 100);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    closeLesson() {
      document.body.classList.remove('viewing');
      document.body.classList.remove('fullscreen-mode');
      document.getElementById('homeView').style.display = '';
      document.getElementById('viewerView').classList.remove('is-active');
      this.currentLesson = null;
      history.replaceState(null, '', location.pathname);
    },

    showCurrent() {
      const L = this.currentLesson;
      if (!L) return;
      const imgEl = document.getElementById('stageImage');
      const symEl = document.getElementById('stageSymbol');
      const symLabel = document.getElementById('stageSymbolLabel');
      const loading = document.getElementById('stageLoading');
      const capTitle = document.getElementById('captionTitle');
      const capSource = document.getElementById('captionSource');
      const capCounter = document.getElementById('captionCounter');

      const resolvedImages = this.resolvedImageIds(L);
      const catalog = this.resolvedCatalog(L);
      const items = this.currentTrack === 'symbols' ? (L.symbols || []) : resolvedImages;
      const total = items.length;
      if (total === 0) {
        capTitle.textContent = 'No pictures for this week yet.';
        capSource.textContent = '';
        capCounter.textContent = '';
        imgEl.classList.remove('is-loaded');
        return;
      }
      this.currentIndex = ((this.currentIndex % total) + total) % total;
      const itemId = items[this.currentIndex];

      if (this.currentTrack === 'symbols' || document.body.classList.contains('simple-mode')) {
        // Show symbol IF we're on the symbols track or simple mode is on with symbols available
        const symbolId = this.currentTrack === 'symbols'
          ? itemId
          : (L.symbols && L.symbols.length ? L.symbols[this.currentIndex % L.symbols.length] : null);
        if (symbolId && this.symbols[symbolId]) {
          const S = this.symbols[symbolId];
          symEl.innerHTML = S.imageUrl
            ? `<img src="${S.imageUrl}" alt="${S.label}" style="width:100%;height:100%;object-fit:contain;">`
            : S.svg;
          symLabel.textContent = S.label;
          capTitle.textContent = S.label;
          capSource.textContent = 'Gospel Symbol';
          imgEl.classList.remove('is-loaded');
          loading.classList.add('is-hidden');
        }
      }

      if (this.currentTrack === 'images' && !document.body.classList.contains('simple-mode')) {
        // Show a narrative image from the resolved catalog
        const img = catalog[itemId];
        if (img) {
          loading.classList.remove('is-hidden');
          imgEl.classList.remove('is-loaded');
          imgEl.src = img.url;
          imgEl.alt = img.title || 'Lesson picture';
          imgEl.onload = () => {
            imgEl.classList.add('is-loaded');
            loading.classList.add('is-hidden');
          };
          imgEl.onerror = () => {
            loading.textContent = 'Picture could not load';
            loading.classList.remove('is-hidden');
          };
          capTitle.textContent = img.title || '';
          // Include fallback indicator if we wanted gospelArt but had to fall back
          const sourceBits = [img.artist, img.source].filter(Boolean);
          if (this.didFallBackForCurrentLesson()) {
            sourceBits.push('(no Gospel Art Book image for this week)');
          }
          capSource.textContent = sourceBits.join(' · ');
        }
      }

      capCounter.textContent = `${this.currentIndex + 1} of ${total}`;

      // sync thumb highlight
      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.setAttribute('aria-current', (this.currentTrack === 'images' && i === this.currentIndex) ? 'true' : 'false');
      });
      document.querySelectorAll('.symbol-btn').forEach((t, i) => {
        t.setAttribute('aria-current', (this.currentTrack === 'symbols' && i === this.currentIndex) ? 'true' : 'false');
      });

      // enable/disable nav (we use wraparound — never disabled, except if empty)
      document.getElementById('prevBtn').disabled = total <= 1;
      document.getElementById('nextBtn').disabled = total <= 1;
    },

    renderThumbs() {
      const strip = document.getElementById('thumbstrip');
      const L = this.currentLesson;
      const resolvedImages = this.resolvedImageIds(L);
      const catalog = this.resolvedCatalog(L);
      if (!L || resolvedImages.length === 0) {
        strip.innerHTML = '';
        strip.classList.add('is-hidden');
        return;
      }
      strip.classList.remove('is-hidden');
      strip.innerHTML = resolvedImages.map((imgId, i) => {
        const img = catalog[imgId];
        if (!img) return '';
        return `<button class="thumb" data-i="${i}" aria-label="Picture ${i + 1}: ${img.title || ''}"><img src="${img.url}" alt="" loading="lazy"></button>`;
      }).join('');
      strip.onclick = (e) => {
        const t = e.target.closest('.thumb');
        if (!t) return;
        this.currentTrack = 'images';
        this.currentIndex = parseInt(t.dataset.i, 10);
        this.showCurrent();
      };
    },

    renderSymbolStrip() {
      const strip = document.getElementById('symbolstrip');
      const L = this.currentLesson;
      if (!L || !L.symbols || L.symbols.length === 0) {
        strip.classList.add('is-hidden');
        return;
      }
      strip.classList.remove('is-hidden');
      const buttons = L.symbols.map((sid, i) => {
        const S = this.symbols[sid];
        if (!S) return '';
        const content = S.imageUrl
          ? `<img src="${S.imageUrl}" alt="" style="width:36px;height:36px;object-fit:contain;">`
          : S.svg;
        return `<button class="symbol-btn" data-i="${i}" aria-label="Symbol: ${S.label}">${content}<span class="lbl">${S.label}</span></button>`;
      }).join('');
      strip.innerHTML = `<span class="symbolstrip-label">Symbols</span>${buttons}`;
      strip.onclick = (e) => {
        const b = e.target.closest('.symbol-btn');
        if (!b) return;
        this.currentTrack = 'symbols';
        this.currentIndex = parseInt(b.dataset.i, 10);
        this.showCurrent();
      };
    },

    next() {
      const L = this.currentLesson;
      if (!L) return;
      const items = this.currentTrack === 'symbols' ? L.symbols : this.resolvedImageIds(L);
      if (!items || !items.length) return;
      this.currentIndex = (this.currentIndex + 1) % items.length;
      this.showCurrent();
    },
    prev() {
      const L = this.currentLesson;
      if (!L) return;
      const items = this.currentTrack === 'symbols' ? L.symbols : this.resolvedImageIds(L);
      if (!items || !items.length) return;
      this.currentIndex = (this.currentIndex - 1 + items.length) % items.length;
      this.showCurrent();
    },

    wireEvents() {
      document.getElementById('prevBtn').addEventListener('click', () => this.prev());
      document.getElementById('nextBtn').addEventListener('click', () => this.next());
      document.getElementById('backBtn').addEventListener('click', () => this.closeLesson());

      document.getElementById('toggleSimple').addEventListener('click', (e) => {
        const on = document.body.classList.toggle('simple-mode');
        e.currentTarget.setAttribute('aria-pressed', String(on));
        // if entering simple mode inside a lesson, refresh the stage
        if (this.currentLesson) this.showCurrent();
      });

      document.getElementById('toggleSource').addEventListener('click', () => {
        this.setImageSource(this.imageSource === 'gospelArt' ? 'manual' : 'gospelArt');
      });

      document.getElementById('toggleFs').addEventListener('click', () => this.enterFullscreen());
      document.getElementById('exitFs').addEventListener('click', () => this.exitFullscreen());

      document.getElementById('toggleThumbs').addEventListener('click', (e) => {
        const strip = document.getElementById('thumbstrip');
        const hidden = strip.classList.toggle('is-hidden');
        e.currentTarget.setAttribute('aria-pressed', String(!hidden));
      });

      // Keyboard support
      document.addEventListener('keydown', (e) => {
        if (!this.currentLesson) {
          // On home view: "t" jumps to today
          if (e.key === 't' || e.key === 'T') {
            const today = this.getTodayLesson();
            if (today) this.openLesson(today.id);
          }
          return;
        }
        if (e.target.matches('input, textarea')) return;
        switch (e.key) {
          case 'ArrowRight':
          case ' ':
          case 'PageDown':
            e.preventDefault(); this.next(); break;
          case 'ArrowLeft':
          case 'PageUp':
            e.preventDefault(); this.prev(); break;
          case 'Escape':
            if (document.body.classList.contains('fullscreen-mode')) this.exitFullscreen();
            else this.closeLesson();
            break;
          case 'f': case 'F':
            if (document.body.classList.contains('fullscreen-mode')) this.exitFullscreen();
            else this.enterFullscreen();
            break;
          case 's': case 'S':
            document.getElementById('toggleSimple').click(); break;
          case 't': case 'T':
            document.getElementById('toggleThumbs').click(); break;
          case 'g': case 'G':
            this.setImageSource(this.imageSource === 'gospelArt' ? 'manual' : 'gospelArt');
            break;
          case 'Home':
            e.preventDefault(); this.currentIndex = 0; this.showCurrent(); break;
          case 'End': {
            e.preventDefault();
            const items = this.currentTrack === 'symbols' ? this.currentLesson.symbols : this.resolvedImageIds(this.currentLesson);
            if (items && items.length) { this.currentIndex = items.length - 1; this.showCurrent(); }
            break;
          }
        }
      });

      // Swipe support on the stage (tablet-friendly)
      const stage = document.getElementById('stage');
      let touchStart = null;
      stage.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
      }, { passive: true });
      stage.addEventListener('touchend', (e) => {
        if (!touchStart) return;
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStart.x;
        const dy = touch.clientY - touchStart.y;
        const dt = Date.now() - touchStart.t;
        if (dt < 800 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
          if (dx < 0) this.next(); else this.prev();
        }
        touchStart = null;
      }, { passive: true });

      // Hash routing — open week from URL
      window.addEventListener('hashchange', () => this.handleInitialRoute());
    },

    handleInitialRoute() {
      const m = location.hash.match(/#week-(\d+)/);
      if (m) {
        const id = parseInt(m[1], 10);
        const L = this.lessons.find(x => x.id === id);
        if (L) {
          this.openLesson(id);
          return;
        }
      }
      if (document.body.classList.contains('viewing')) {
        this.closeLesson();
      }
    },

    enterFullscreen() {
      if (!this.currentLesson) {
        // if on home view, open today and go full screen
        const today = this.getTodayLesson();
        if (today) this.openLesson(today.id);
      }
      document.body.classList.add('fullscreen-mode');
      document.getElementById('toggleFs').setAttribute('aria-pressed', 'true');
      // request true browser fullscreen too
      const el = document.documentElement;
      if (el.requestFullscreen) {
        el.requestFullscreen().catch(() => {});
      }
    },

    exitFullscreen() {
      document.body.classList.remove('fullscreen-mode');
      document.getElementById('toggleFs').setAttribute('aria-pressed', 'false');
      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen().catch(() => {});
      }
    },
  };

  // kick off
  App.init();
  window.App = App; // expose for debugging
})();
</script>

</body>
</html>
